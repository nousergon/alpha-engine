services:
  ib-gateway:
    image: gnzsnz/ib-gateway-docker:latest
    container_name: ib-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:4002:4002"
    environment:
      TWS_USERID: ${IB_USER}
      TWS_PASSWORD: ${IB_PASS}
      TRADING_MODE: paper
      TOTP_SECRET: ${TOTP_SECRET}
      TWS_SETTINGS_PATH: /home/ibgateway/settings
    volumes:
      - ib-settings:/home/ibgateway/settings

volumes:
  ib-settings:
